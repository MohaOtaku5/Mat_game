<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Lotto: The Live Show 🎬🏰</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root { --gold: #ffcc00; --stone: #1a1a1a; --wall: #333; --corridor: #444; --bg: #050505; }

        body {
            background-color: var(--bg); color: #eee; font-family: 'VT323', monospace;
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 500; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #fff; z-index: 9999; opacity: 0; pointer-events: none;
        }
        .flash-anim { animation: flashScreen 0.8s ease-out; }
        @keyframes flashScreen { 0% { opacity: 1; } 100% { opacity: 0; } }

        #game-container {
            width: 95vw; height: 90vh; background: #111; border: 4px solid var(--wall);
            display: flex; flex-direction: column; position: relative;
        }

        header {
            padding: 15px; border-bottom: 2px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center; background: #1a1a1a;
            position: relative; z-index: 10;
        }

        h1 { margin: 0; color: var(--gold); font-size: 2.2rem; text-shadow: 0 0 10px var(--gold); }
        #room-counter { font-size: 2.5rem; color: #fff; border: 2px solid var(--gold); padding: 5px 20px; background: #000; font-weight: bold; }
        
        body.is-host #view-player { display: none !important; }
        body.is-player #view-host { display: none !important; }

        #view-host { flex-grow: 1; display: flex; position: relative; overflow: hidden; flex-direction: column; }
        #view-player { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; gap: 20px; z-index: 10; }

        #dungeon-canvas { flex-grow: 1; position: relative; }
        
        #side-panel {
            position: absolute; right: 20px; top: 20px; width: 220px; background: rgba(0,0,0,0.85);
            border: 1px solid var(--gold); padding: 15px; max-height: 60%; overflow-y: auto; z-index: 100;
        }
        
        #live-log {
            position: absolute; left: 20px; top: 20px; width: 340px; background: rgba(0,0,0,0.9);
            border: 2px dashed var(--gold); padding: 15px; font-size: 1.4rem; z-index: 100;
            display: none; box-shadow: 0 0 20px rgba(0,0,0,0.8); line-height: 1.4;
        }

        /* --- VISUALIZADOR DE DADOS GEOMÉTRICOS --- */
        #dice-visualizer {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            margin-top: 15px; padding: 20px 0; border-top: 1px solid #333;
        }
        
        .rpg-dice {
            width: 120px; height: 120px; background: var(--gold); color: #000;
            display: flex; justify-content: center; align-items: center;
            font-size: 4.5rem; font-weight: bold; text-shadow: 0 0 5px rgba(255,255,255,0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* FORMAS DE LOS DADOS (CSS Polygons) */
        .dice-d4 { 
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%); 
            align-items: flex-end; padding-bottom: 15px; /* Ajuste para que el texto baje */
        }
        .dice-d6 { 
            border-radius: 15px; 
        }
        .dice-d8 { 
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); 
        }

        /* ESTADOS DEL DADO */
        .dice-rolling { 
            animation: spinShake 0.1s infinite; filter: blur(1px); 
            background: #888; color: #fff;
        }
        .dice-explode { 
            background: #e74c3c !important; color: #fff !important; 
            transform: scale(1.4); box-shadow: 0 0 40px #e74c3c !important;
            animation: pulseExplode 0.5s infinite alternate;
        }

        @keyframes spinShake {
            0% { transform: rotate(-10deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.1); }
            100% { transform: rotate(-10deg) scale(1); }
        }
        @keyframes pulseExplode {
            0% { transform: scale(1.3); text-shadow: 0 0 10px #fff; }
            100% { transform: scale(1.5); text-shadow: 0 0 30px #fff; }
        }

        .controls { padding: 15px; background: #1a1a1a; display: flex; justify-content: center; gap: 20px; border-top: 1px solid var(--gold); z-index: 10; }
        
        /* TRAGAPERRAS */
        #seed-tag { display: flex; flex-direction: column; align-items: center; min-width: 250px; }
        .slot-machine { display: flex; gap: 15px; margin-bottom: 5px; }
        .slot-box {
            width: 55px; height: 65px; background: #050505; border: 3px solid #333;
            display: flex; justify-content: center; align-items: center;
            font-size: 4rem; font-weight: bold; color: #fff;
            box-shadow: inset 0 0 15px rgba(0,0,0,1); border-radius: 5px; transition: 0.3s;
        }
        .slot-box.spinning { color: #444; filter: blur(1.5px); text-shadow: 0 10px 5px rgba(255,255,255,0.2), 0 -10px 5px rgba(255,255,255,0.2); }
        .slot-box.locked { animation: lockImpact 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; border-color: #aaa; }
        .slot-box.active-roll { border-color: #2ecc71; box-shadow: 0 0 20px #2ecc71, inset 0 0 15px rgba(46, 204, 113, 0.3); transform: scale(1.1); z-index: 50; }
        .slot-box.jackpot { border-color: #e74c3c; color: #e74c3c; text-shadow: 0 0 25px #e74c3c; animation: jackpotPulse 0.5s infinite alternate; }
        .slot-box.bonus { border-color: var(--gold); color: var(--gold); text-shadow: 0 0 20px var(--gold); }

        @keyframes lockImpact { 0% { transform: scale(1.4) translateY(-15px); color: #fff; text-shadow: 0 0 20px #fff; } 100% { transform: scale(1) translateY(0); } }
        @keyframes jackpotPulse { 0% { transform: scale(1); box-shadow: inset 0 0 20px rgba(231, 76, 60, 0.4); } 100% { transform: scale(1.1); box-shadow: inset 0 0 50px rgba(231, 76, 60, 0.9); } }

        .shake-small { animation: shakeSmall 0.15s; }
        @keyframes shakeSmall { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(3px, 5px); } }
        .shake-heavy { animation: shakeHeavy 0.3s; }
        @keyframes shakeHeavy { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-8px, -5px); } 50% { transform: translate(8px, 5px); } 75% { transform: translate(-5px, 8px); } }

        .room { position: absolute; width: 45px; height: 45px; background: #2a2a2a; border: 2px solid var(--wall); display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 10; animation: appear 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .corridor { position: absolute; background: var(--corridor); z-index: 5; }
        #winner-banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 4px double var(--gold); padding: 40px; text-align: center; z-index: 1000; display: none; min-width: 450px; box-shadow: 0 0 50px rgba(0,0,0,1); }
        #bet-timer { color: #e74c3c; font-size: 1.4rem; font-weight: bold; margin-top: 5px; height: 25px;}

        button { background: #222; color: var(--gold); border: 2px solid var(--gold); padding: 10px 25px; font-family: 'VT323'; font-size: 1.5rem; cursor: pointer; transition: 0.2s;}
        button:hover { background: var(--gold); color: #000; box-shadow: 0 0 10px var(--gold);}
        input { background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 15px; font-family: 'VT323'; font-size: 1.5rem; text-align: center; }

        @keyframes appear { 0% { transform: scale(0) rotate(-20deg); } 100% { transform: scale(1) rotate(0deg); } }
    </style>
</head>
<body>

<script>
    if (new URLSearchParams(window.location.search).get('host') === 'true') {
        document.body.classList.add('is-host');
    } else {
        document.body.classList.add('is-player');
    }
</script>

<div id="flash-overlay"></div>

<div id="game-container">
    <header>
        <h1>DUNGEON LOTTO</h1>
        <div id="room-counter">SALAS: 0</div>
        
        <div id="seed-tag">
            <div class="slot-machine">
                <div id="slot-1" class="slot-box">?</div>
                <div id="slot-2" class="slot-box">?</div>
                <div id="slot-3" class="slot-box">?</div>
            </div>
            <span id="seed-bono" style="font-size: 1.3rem; font-weight: bold; height: 20px;"></span>
            <span id="bet-timer"></span>
        </div>
    </header>

    <div id="view-host">
        <div id="dungeon-canvas"></div>
        
        <div id="live-log">
            <h3 style="margin:0 0 10px 0; color:var(--gold); border-bottom:1px solid var(--gold); text-align:center;">📡 CRÓNICA DE FORJA</h3>
            
            <div id="dice-visualizer">
                <div id="active-dice-shape" class="rpg-dice">0</div>
                <div id="dice-status-text" style="color:var(--gold); margin-top:15px; font-weight:bold;">TIRANDO...</div>
            </div>

            <div id="log-content" style="margin-top:15px; text-align:center; color:#aaa;">Esperando a los dioses...</div>
        </div>
        
        <div id="winner-banner">
            <h2 id="win-title" style="color: var(--gold); margin-top: 0; font-size: 3rem;"></h2>
            <div id="winner-list" style="font-size: 2rem; margin: 20px 0; color: #fff;"></div>
            <button onclick="cerrarBanner()">SIGUIENTE VÍCTIMA</button>
        </div>

        <div id="side-panel">
            <h3 style="color: var(--gold); margin: 0 0 10px 0; border-bottom: 1px solid var(--gold);">📜 APUESTAS</h3>
            <ul id="list-bets" style="list-style: none; padding: 0; margin: 0; font-size: 1.2rem;"></ul>
        </div>

        <div class="controls">
            <button id="btn-seed" onclick="nuevaRonda()">TIRAR DE LA PALANCA</button>
            <button id="btn-reveal" style="display:none" onclick="forjarMazmorraEnVivo()">FORJAR MAZMORRA</button>
        </div>
    </div>

    <div id="view-player">
        <h2 style="color:var(--gold); margin-bottom: 0;">INGRESA TU APUESTA</h2>
        <input type="text" id="p-name" placeholder="NOMBRE DEL HÉROE">
        <input type="number" id="p-bet" placeholder="NÚMERO DE SALAS">
        <button onclick="enviarApuesta()">SELLAR CON SANGRE</button>
        <p id="msg-ok" style="color: #2ecc71; font-size: 1.5rem;"></p>
    </div>
</div>

<script>
    const SB_URL = 'https://mzlamrxvtvxbuamyfplz.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16bGFtcnh2dHZ4YnVhbXlmcGx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTAxNjEsImV4cCI6MjA5MjkyNjE2MX0.fdebTvX68sDHUbIjCFDhfipauXap4qabWko7U8gLyxg';
    const miSupabase = supabase.createClient(SB_URL, SB_KEY);

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    let roomsData = [];
    const tileSize = 50;
    let timerInterval;
    let globalRoomCount = 0;

    window.onload = () => {
        if (document.body.classList.contains('is-host')) {
            cargarApuestas();
            escucharApuestas();
        }
    };

    async function cargarApuestas() {
        const { data } = await miSupabase.from('apuestas').select('*');
        if (data) {
            const lista = document.getElementById('list-bets');
            lista.innerHTML = "";
            data.forEach(p => {
                const li = document.createElement('li');
                li.style.padding = "5px"; li.style.borderBottom = "1px solid #333";
                li.innerHTML = `👤 ${p.name}: <span style="color:var(--gold); font-weight:bold;">${p.cantidad}</span>`;
                lista.prepend(li);
            });
        }
    }

    async function nuevaRonda() {
        document.getElementById('btn-seed').disabled = true;
        const letras = ['A', 'B', 'C'];
        let seed = "";
        for(let i=0; i<3; i++) seed += letras[Math.floor(Math.random() * 3)];
        window.currentSeed = seed;

        document.getElementById('dungeon-canvas').innerHTML = "";
        document.getElementById('room-counter').innerText = "SALAS: 0";
        document.getElementById('winner-banner').style.display = 'none';
        document.getElementById('live-log').style.display = 'none';
        document.getElementById('dice-visualizer').style.display = 'none';
        document.getElementById('seed-bono').innerText = "";
        document.getElementById('bet-timer').innerText = "";
        
        let slots = [document.getElementById('slot-1'), document.getElementById('slot-2'), document.getElementById('slot-3')];
        slots.forEach(s => { s.className = "slot-box spinning"; s.innerText = "?"; });

        await miSupabase.from('apuestas').delete().neq('id', 0);
        document.getElementById('list-bets').innerHTML = "";

        const stopTimes = [2000, 4000, 6500]; 

        slots.forEach((slot, index) => {
            let spinInterval = setInterval(() => {
                slot.innerText = letras[Math.floor(Math.random() * 3)];
                slot.style.transform = `translateY(${Math.random() * 10 - 5}px)`; 
            }, 50);

            setTimeout(() => {
                clearInterval(spinInterval);
                slot.style.transform = `translateY(0)`;
                slot.innerText = seed[index];
                slot.className = "slot-box locked"; 
                
                if(index < 2) {
                    document.getElementById('game-container').classList.add('shake-small');
                    setTimeout(()=> document.getElementById('game-container').classList.remove('shake-small'), 150);
                } else {
                    document.getElementById('game-container').classList.add('shake-heavy');
                    setTimeout(()=> document.getElementById('game-container').classList.remove('shake-heavy'), 300);
                    setTimeout(()=> aplicarEstilosBono(seed), 1000); 
                }
            }, stopTimes[index]);
        });
    }

    function aplicarEstilosBono(seed) {
        let counts = { 'A':0, 'B':0, 'C':0 };
        for(let l of seed) counts[l]++;
        
        let slots = [document.getElementById('slot-1'), document.getElementById('slot-2'), document.getElementById('slot-3')];
        let tagBono = document.getElementById('seed-bono');
        
        if(counts['A']==3||counts['B']==3||counts['C']==3) {
            slots.forEach(s => s.className = "slot-box jackpot");
            tagBono.innerText = "¡JACKPOT x3!"; tagBono.style.color = "#e74c3c";
            let flash = document.getElementById('flash-overlay');
            flash.classList.add('flash-anim');
            setTimeout(() => flash.classList.remove('flash-anim'), 800);
        } else if(counts['A']==2||counts['B']==2||counts['C']==2) {
            let letraDoble = Object.keys(counts).find(k => counts[k] === 2);
            slots.forEach((s, i) => { if(seed[i] === letraDoble) s.className = "slot-box bonus"; else s.className = "slot-box"; });
            tagBono.innerText = `BONUS: PAREJA [${letraDoble}] x2`; tagBono.style.color = "var(--gold)";
        } else {
            slots.forEach(s => s.className = "slot-box");
            tagBono.innerText = "MODO NORMAL"; tagBono.style.color = "#888";
        }

        document.getElementById('btn-reveal').style.display = 'block';
        document.getElementById('btn-seed').style.display = 'none';
        document.getElementById('btn-seed').disabled = false;
        iniciarTemporizador();
    }

    function iniciarTemporizador() {
        let timeLeft = 30;
        document.getElementById('bet-timer').innerText = "⏱️ TIEMPO: " + timeLeft + "s";
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('bet-timer').innerText = "⏱️ TIEMPO: " + timeLeft + "s";
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('bet-timer').innerText = "¡APUESTAS CERRADAS!";
            }
        }, 1000);
    }

    async function enviarApuesta() {
        const n = document.getElementById('p-name').value;
        const b = document.getElementById('p-bet').value;
        if(!n || !b) return alert("Faltan datos.");
        await miSupabase.from('apuestas').insert([{ name: n, cantidad: parseInt(b) }]);
        document.getElementById('msg-ok').innerText = "✅ ENVIADA";
        document.getElementById('p-bet').value = "";
        setTimeout(()=> document.getElementById('msg-ok').innerText = "", 3000);
    }

    // ==========================================
    // EL NÚCLEO CON DADOS VISUALES 3D (CSS)
    // ==========================================
    async function forjarMazmorraEnVivo() {
        clearInterval(timerInterval);
        document.getElementById('bet-timer').innerText = "";
        document.getElementById('btn-reveal').style.display = 'none';
        
        let logUI = document.getElementById('live-log');
        let diceBox = document.getElementById('dice-visualizer');
        let diceShape = document.getElementById('active-dice-shape');
        let diceStatus = document.getElementById('dice-status-text');
        let logContent = document.getElementById('log-content');
        
        logUI.style.display = 'block';
        diceBox.style.display = 'flex';
        logContent.innerHTML = "";
        
        let seed = window.currentSeed;
        let slots = [document.getElementById('slot-1'), document.getElementById('slot-2'), document.getElementById('slot-3')];
        
        roomsData = [];
        globalRoomCount = 0;
        const canvas = document.getElementById('dungeon-canvas');
        const startX = Math.floor(canvas.offsetWidth / 2 / tileSize) * tileSize;
        const startY = Math.floor(canvas.offsetHeight / 2 / tileSize) * tileSize;
        colocarRoom(startX, startY, "🏰", 0);

        let totalSalasFinales = 0;
        let basePorLetra = {A:0, B:0, C:0};
        let counts = {A:0, B:0, C:0};
        for(let l of seed) counts[l]++;

        let lineasLog = [];

        for(let i=0; i<3; i++) {
            let letra = seed[i];
            let caras = (letra==='A') ? 4 : (letra==='B') ? 6 : 8;
            let claseDado = (letra==='A') ? 'dice-d4' : (letra==='B') ? 'dice-d6' : 'dice-d8';
            
            slots.forEach(s => s.classList.remove('active-roll'));
            slots[i].classList.add('active-roll');

            // Configurar la forma del dado según la letra
            diceShape.className = `rpg-dice ${claseDado}`;
            diceShape.innerText = "?";
            diceStatus.innerText = `PREPARANDO D${caras}...`;
            diceStatus.style.color = "#aaa";

            lineasLog.push(`Slot ${i+1} [${letra} - D${caras}]:`);
            logContent.innerHTML = lineasLog.join('<br>');
            
            await sleep(1000); 

            let sumaDado = 0;
            let tiradas = [];
            let tirada;
            
            do {
                // ANIMACIÓN DE GIRO DE DADO
                diceShape.classList.add('dice-rolling');
                diceStatus.innerText = "¡TIRANDO!";
                diceStatus.style.color = "var(--gold)";
                
                let rollAnim = setInterval(() => {
                    diceShape.innerText = Math.floor(Math.random() * caras) + 1;
                }, 50);

                await sleep(1200); // Tiempo que está el dado girando visualmente
                clearInterval(rollAnim);
                diceShape.classList.remove('dice-rolling');

                // RESULTADO REAL
                tirada = Math.floor(Math.random() * caras) + 1;
                sumaDado += tirada;
                diceShape.innerText = tirada;
                
                if(tirada === caras) {
                    // ¡EXPLOSIÓN!
                    tiradas.push(`<span style="color:#e74c3c; font-weight:bold">${tirada}💥</span>`);
                    diceShape.classList.add('dice-explode');
                    diceStatus.innerText = "¡EXPLOSIÓN! TIRA OTRA VEZ";
                    diceStatus.style.color = "#e74c3c";
                    
                    document.getElementById('game-container').classList.add('shake-heavy');
                    setTimeout(()=> document.getElementById('game-container').classList.remove('shake-heavy'), 200);
                    
                    lineasLog[lineasLog.length - 1] = `Slot ${i+1} [${letra}]: { ${tiradas.join(' + ')}... }`;
                    logContent.innerHTML = lineasLog.join('<br>');
                    
                    await sleep(2500); // 2.5s con el dado en rojo gigante para que griten
                    diceShape.classList.remove('dice-explode');
                } else {
                    // TIRADA NORMAL
                    tiradas.push(tirada);
                    diceStatus.innerText = "FIJADO";
                    diceStatus.style.color = "#2ecc71";
                    
                    lineasLog[lineasLog.length - 1] = `Slot ${i+1} [${letra}]: { ${tiradas.join(' + ')} }`;
                    logContent.innerHTML = lineasLog.join('<br>');
                    
                    await sleep(1500); // 1.5s viendo el número antes de forjar
                }

            } while(tirada === caras);

            basePorLetra[letra] += sumaDado;
            totalSalasFinales += sumaDado;

            lineasLog[lineasLog.length - 1] = `<span style="color:var(--gold)">Slot ${i+1} [${letra}]:</span> { ${tiradas.join(' + ')} } = <strong>${sumaDado}</strong>`;
            logContent.innerHTML = lineasLog.join('<br>');

            diceStatus.innerText = `FORJANDO ${sumaDado} SALAS...`;
            diceStatus.style.color = "#fff";
            await spawnSalasVisually(sumaDado, false);
            
            slots[i].classList.remove('active-roll');
            await sleep(1000); 
        }

        // FASE 2: Multiplicadores
        diceBox.style.display = 'none'; // Ocultamos el dado, ya no hace falta
        
        let esJackpot = (counts['A']===3 || counts['B']===3 || counts['C']===3);
        let letraDoble = Object.keys(counts).find(k => counts[k] === 2);

        if(esJackpot) {
            lineasLog.push(`<hr><span style="color:#e74c3c; font-size:1.6rem; animation: pulse 1s infinite;">🚨 CALCULANDO JACKPOT... 🚨</span>`);
            logContent.innerHTML = lineasLog.join('<br>');
            
            await sleep(3500); 
            
            let salasExtra = totalSalasFinales * 2; 
            
            let flash = document.getElementById('flash-overlay');
            flash.classList.add('flash-anim');
            setTimeout(() => flash.classList.remove('flash-anim'), 800);

            lineasLog[lineasLog.length - 1] = `<hr><span style="color:#e74c3c; font-size:1.6rem;">🚨 ¡JACKPOT x3 ACTIVADO! 🚨<br>Inyectando ${salasExtra} salas extra...</span>`;
            logContent.innerHTML = lineasLog.join('<br>');

            await spawnSalasVisually(salasExtra, true); 
            totalSalasFinales *= 3;
            
        } else if (letraDoble) {
            lineasLog.push(`<hr><span style="color:var(--gold); font-size:1.4rem;">✨ CALCULANDO BONUS PAREJA... ✨</span>`);
            logContent.innerHTML = lineasLog.join('<br>');
            
            await sleep(2500); 
            
            let salasExtra = basePorLetra[letraDoble]; 
            
            lineasLog[lineasLog.length - 1] = `<hr><span style="color:var(--gold); font-size:1.4rem;">✨ BONUS PAREJA [${letraDoble}] x2 ✨<br>Añadiendo ${salasExtra} salas...</span>`;
            logContent.innerHTML = lineasLog.join('<br>');

            await spawnSalasVisually(salasExtra, true);
            totalSalasFinales += salasExtra;
        }

        // FIN DEL JUEGO
        lineasLog.push(`<br><div style="background:#fff; color:#000; text-align:center; padding:5px; font-weight:bold;">COMPROBANDO APUESTAS...</div>`);
        logContent.innerHTML = lineasLog.join('<br>');
        
        await sleep(3000); 

        buscarGanadores(totalSalasFinales);
    }

    async function spawnSalasVisually(cantidad, frenesi) {
        let counterUI = document.getElementById('room-counter');
        let container = document.getElementById('game-container');

        for(let i=0; i<cantidad; i++) {
            let ok = false; let tries = 0;
            while(!ok && tries < 50) {
                const parent = roomsData[Math.floor(Math.random() * roomsData.length)];
                const dir = [[0,1], [0,-1], [1,0], [-1,0]][Math.floor(Math.random()*4)];
                const nX = parent.x + (dir[0] * tileSize);
                const nY = parent.y + (dir[1] * tileSize);
                if(!roomsData.some(r => r.x === nX && r.y === nY)) {
                    colocarPasillo(parent.x, parent.y, nX, nY);
                    colocarRoom(nX, nY, "🪨", globalRoomCount + 1);
                    ok = true;
                }
                tries++;
            }
            
            globalRoomCount++;
            counterUI.innerText = "SALAS: " + globalRoomCount;
            if(frenesi) counterUI.style.color = "#e74c3c";
            
            container.classList.add('shake-small');
            setTimeout(() => container.classList.remove('shake-small'), 50);

            let delay;
            if(frenesi) {
                delay = 40; 
            } else {
                let remaining = cantidad - i;
                if(remaining === 1) delay = 1000; 
                else if(remaining === 2) delay = 600; 
                else if(remaining === 3) delay = 350;
                else delay = 120; 
            }
            await sleep(delay);
        }
    }

    function colocarRoom(x, y, icon, idx) {
        const room = document.createElement('div');
        room.className = 'room'; room.style.left = x + 'px'; room.style.top = y + 'px';
        if(idx > 0 && Math.random() > 0.8) icon = "💰";
        room.innerHTML = icon;
        document.getElementById('dungeon-canvas').appendChild(room);
        roomsData.push({x, y});
    }

    function colocarPasillo(x1, y1, x2, y2) {
        const corr = document.createElement('div');
        corr.className = 'corridor'; const p = 22;
        if(x1 === x2) { 
            corr.style.width = '6px'; corr.style.height = tileSize + 'px';
            corr.style.left = (x1 + p) + 'px'; corr.style.top = Math.min(y1, y2) + p + 'px';
        } else { 
            corr.style.height = '6px'; corr.style.width = tileSize + 'px';
            corr.style.top = (y1 + p) + 'px'; corr.style.left = Math.min(x1, x2) + p + 'px';
        }
        document.getElementById('dungeon-canvas').appendChild(corr);
    }

    async function buscarGanadores(total) {
        const { data: b } = await miSupabase.from('apuestas').select('*');
        const list = document.getElementById('winner-list');
        document.getElementById('winner-banner').style.display = 'block';
        
        let ganadores = b.filter(a => parseInt(a.cantidad) === total);
        let casiGanadores = b.filter(a => Math.abs(parseInt(a.cantidad) - total) === 1);
        
        let html = `<div style="font-size: 2.5rem; margin-bottom: 20px;">TOTAL EXACTO: <span style="color:#fff">${total}</span></div>`;
        
        if(ganadores.length > 0) {
            document.getElementById('win-title').innerText = "¡VICTORIA!";
            document.getElementById('win-title').style.color = "#2ecc71";
            html += ganadores.map(w => `🏆 ${w.name}`).join('<br>');
        } else {
            document.getElementById('win-title').innerText = "DERROTA COLECTIVA";
            document.getElementById('win-title').style.color = "#e74c3c";
        }
        if(casiGanadores.length > 0) {
            html += `<div class="casi-miss" style="margin-top: 25px; font-size: 1.5rem; border-top: 1px dashed #555; padding-top:10px;">¡POR LOS PELOS! (±1):</div>`;
            html += casiGanadores.map(w => `<span style="color:#ff9900">😅 ${w.name} (Apostó ${w.cantidad})</span>`).join('<br>');
        }
        list.innerHTML = html;
        document.getElementById('btn-seed').style.display = 'block';
        document.getElementById('btn-seed').disabled = false;
    }

    function cerrarBanner() { document.getElementById('winner-banner').style.display = 'none'; }

    function escucharApuestas() {
        miSupabase.channel('l').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'apuestas' }, p => {
            const li = document.createElement('li');
            li.style.padding = "5px"; li.style.borderBottom = "1px solid #333";
            li.innerHTML = `👤 ${p.new.name}: <span style="color:var(--gold); font-weight:bold;">${p.new.cantidad}</span>`;
            document.getElementById('list-bets').prepend(li);
        }).subscribe();
    }
</script>

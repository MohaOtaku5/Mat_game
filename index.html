<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Seed Lotto 🏰</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=VT323&display=swap');

        :root {
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.4);
            --stone: #2c2c2c;
            --wall: #444;
            --bg: #0a0a0a;
            --win-color: #2ecc71;
        }

        body {
            background-color: var(--bg);
            color: #eee;
            font-family: 'VT323', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* EFECTO CRT (SCANLINES) DE LA UI ANTERIOR */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 500;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #game-container {
            width: 95vw;
            height: 90vh;
            background: #151515;
            border: 4px solid var(--wall);
            outline: 2px solid var(--gold);
            outline-offset: -10px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            z-index: 10;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 0 0 15px var(--gold-glow);
            letter-spacing: 3px;
        }

        #room-counter {
            font-size: 2rem;
            color: var(--gold);
            margin-top: 5px;
        }

        /* CANVAS DE LA MAZMORRA */
        #dungeon-canvas {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background: rgba(0,0,0,0.4);
        }

        .room {
            position: absolute;
            width: 45px;
            height: 45px;
            background: var(--stone);
            border: 2px solid var(--wall);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 10;
            box-shadow: inset 0 0 10px #000;
            animation: appear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .corridor {
            position: absolute;
            background: var(--wall);
            z-index: 5;
        }

        /* BANNER DE GANADORES PROFESIONAL */
        #winner-banner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 4px double var(--gold);
            padding: 40px;
            text-align: center;
            z-index: 1000;
            display: none;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        #winner-banner h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.5rem; margin: 0; }
        #winner-list { font-size: 2rem; color: #fff; margin: 20px 0; }

        /* SIDE PANEL (APUESTAS) */
        #side-panel {
            position: absolute;
            right: 25px;
            top: 100px;
            width: 220px;
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--gold);
            padding: 15px;
            max-height: 50%;
            overflow-y: auto;
            z-index: 100;
        }

        .controls { 
            padding: 20px; 
            background: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            border-top: 1px solid var(--gold); 
        }
        
        button {
            background: var(--stone);
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 10px 25px;
            font-family: 'VT323';
            font-size: 1.4rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        .hidden { display: none; }

        /* VISTA JUGADOR */
        #view-player { text-align: center; margin-top: 15vh; }
        input {
            background: #000;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px;
            font-family: 'VT323';
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 15px;
            width: 80%;
            max-width: 300px;
        }

        @keyframes appear {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .shake { animation: shake 0.2s; }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <h1>DUNGEON LOTTO</h1>
        <div id="room-counter">CRIPTAS EXPLORADAS: 0</div>
    </header>

    <div id="view-host" class="hidden">
        <div id="dungeon-canvas"></div>
        
        <div id="winner-banner">
            <h2 id="win-title">RONDA FINALIZADA</h2>
            <div id="winner-list">...</div>
            <button onclick="cerrarBanner()">SIGUIENTE EXPEDICIÓN</button>
        </div>

        <div id="side-panel">
            <div style="color: var(--gold); border-bottom: 1px solid var(--gold); margin-bottom: 10px;">EXPEDICIONARIOS</div>
            <ul id="list-bets" style="list-style: none; padding: 0; font-size: 1.2rem; margin: 0;"></ul>
        </div>
        
        <div class="controls">
            <button onclick="nuevaRonda()">GENERAR SEED</button>
            <button id="btn-reveal" style="display:none" onclick="revelar()">REVELAR MAPA</button>
        </div>
    </div>

    <div id="view-player" class="hidden">
        <input type="text" id="p-name" placeholder="NOMBRE DEL HÉROE"><br>
        <input type="number" id="p-bet" placeholder="APUESTA DE SALAS"><br>
        <button onclick="enviarApuesta()">SELLAR APUESTA</button>
        <p id="msg-ok" style="color: var(--gold); font-size: 1.5rem;"></p>
    </div>
</div>

<script>
    const SB_URL = 'https://mzlamrxvtvxbuamyfplz.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16bGFtcnh2dHZ4YnVhbXlmcGx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTAxNjEsImV4cCI6MjA5MjkyNjE2MX0.fdebTvX68sDHUbIjCFDhfipauXap4qabWko7U8gLyxg';
    const miSupabase = supabase.createClient(SB_URL, SB_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const soyHost = urlParams.get('host') === 'true';

    if (soyHost) {
        document.getElementById('view-host').classList.remove('hidden');
        escucharApuestas();
    } else {
        document.getElementById('view-player').classList.remove('hidden');
    }

    let roomsData = [];
    const tileSize = 50;

    async function nuevaRonda() {
        const letras = ['A', 'B', 'C'];
        let seed = "";
        for(let i=0; i<3; i++) seed += letras[Math.floor(Math.random() * 3)];
        
        window.currentSeed = seed;
        document.getElementById('dungeon-canvas').innerHTML = "";
        document.getElementById('room-counter').innerText = "CRIPTAS EXPLORADAS: 0";
        document.getElementById('winner-banner').style.display = 'none';
        document.getElementById('btn-reveal').style.display = 'block';
        
        await miSupabase.from('apuestas').delete().neq('id', 0);
        document.getElementById('list-bets').innerHTML = "";
    }

    async function enviarApuesta() {
        const n = document.getElementById('p-name').value;
        const b = document.getElementById('p-bet').value;
        if(!n || !b) return alert("Héroe, faltan datos.");
        const { error } = await miSupabase.from('apuestas').insert([{ name: n, cantidad: parseInt(b) }]);
        if(!error) document.getElementById('msg-ok').innerText = "✅ APUESTA REGISTRADA";
    }

    function revelar() {
        const seed = window.currentSeed;
        let total = 0;
        seed.split('').forEach(l => {
            if(l === 'A') total += Math.floor(Math.random() * 4) + 1;
            if(l === 'B') total += Math.floor(Math.random() * 6) + 1;
            if(l === 'C') total += Math.floor(Math.random() * 8) + 1;
        });

        document.getElementById('btn-reveal').style.display = 'none';
        generarProcedural(total);
    }

    function generarProcedural(num) {
        const canvas = document.getElementById('dungeon-canvas');
        roomsData = [];
        const startX = Math.floor(canvas.offsetWidth / 2 / tileSize) * tileSize;
        const startY = Math.floor(canvas.offsetHeight / 2 / tileSize) * tileSize;

        colocarRoom(startX, startY, "🏰", 0);
        
        for(let i = 1; i < num; i++) {
            setTimeout(() => {
                let ok = false;
                let tries = 0;
                while(!ok && tries < 50) {
                    const parent = roomsData[Math.floor(Math.random() * roomsData.length)];
                    const dir = [[0,1], [0,-1], [1,0], [-1,0]][Math.floor(Math.random()*4)];
                    const nX = parent.x + (dir[0] * tileSize);
                    const nY = parent.y + (dir[1] * tileSize);

                    if(!roomsData.some(r => r.x === nX && r.y === nY)) {
                        colocarPasillo(parent.x, parent.y, nX, nY);
                        colocarRoom(nX, nY, "🪨", i);
                        ok = true;
                    }
                    tries++;
                }
                document.getElementById('room-counter').innerText = "CRIPTAS EXPLORADAS: " + (i+1);
                document.getElementById('game-container').classList.add('shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 150);

                if(i === num - 1) setTimeout(() => buscarGanadores(num), 1200);
            }, i * 400);
        }
    }

    function colocarRoom(x, y, icon, idx) {
        const room = document.createElement('div');
        room.className = 'room';
        room.style.left = x + 'px';
        room.style.top = y + 'px';
        if(idx > 0 && Math.random() > 0.8) icon = "💰";
        room.innerHTML = icon;
        document.getElementById('dungeon-canvas').appendChild(room);
        roomsData.push({x, y});
    }

    function colocarPasillo(x1, y1, x2, y2) {
        const corr = document.createElement('div');
        corr.className = 'corridor';
        const p = 22;
        if(x1 === x2) { 
            corr.style.width = '6px'; corr.style.height = tileSize + 'px';
            corr.style.left = (x1 + p) + 'px'; corr.style.top = Math.min(y1, y2) + p + 'px';
        } else { 
            corr.style.height = '6px'; corr.style.width = tileSize + 'px';
            corr.style.top = (y1 + p) + 'px'; corr.style.left = Math.min(x1, x2) + p + 'px';
        }
        document.getElementById('dungeon-canvas').appendChild(corr);
    }

    async function buscarGanadores(total) {
        const { data: b } = await miSupabase.from('apuestas').select('*');
        const list = document.getElementById('winner-list');
        document.getElementById('winner-banner').style.display = 'block';

        const wins = b.filter(a => a.cantidad === total);
        if(wins.length > 0) {
            document.getElementById('win-title').innerText = "¡HÉROES VICTORIOSOS!";
            document.getElementById('win-title').style.color = "var(--win-color)";
            list.innerHTML = wins.map(w => `🏆 ${w.name}`).join('<br>');
        } else {
            document.getElementById('win-title').innerText = "SIN SUPERVIVIENTES";
            document.getElementById('win-title').style.color = "#e74c3c";
            list.innerHTML = "Nadie predijo las " + total + " criptas.";
        }
    }

    function cerrarBanner() { document.getElementById('winner-banner').style.display = 'none'; }

    function escucharApuestas() {
        miSupabase.channel('l').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'apuestas' }, p => {
            const li = document.createElement('li');
            li.innerHTML = `👤 ${p.new.name} (${p.new.cantidad})`;
            document.getElementById('list-bets').prepend(li);
        }).subscribe();
    }
</script>
</body>
</html>

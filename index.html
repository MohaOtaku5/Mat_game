<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Lotto: Procedural Master 🏰</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --gold: #ffcc00;
            --stone: #1a1a1a;
            --wall: #333;
            --corridor: #444;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: #eee;
            font-family: 'VT323', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Contenedor Principal */
        #game-container {
            width: 95vw;
            height: 90vh;
            background: #111;
            border: 4px solid var(--wall);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        header {
            padding: 10px;
            text-align: center;
            background: #1a1a1a;
            border-bottom: 2px solid var(--gold);
        }

        h1 { margin: 0; color: var(--gold); font-size: 2.5rem; text-shadow: 0 0 10px var(--gold); }

        /* Área del Mapa (Canvas de la Mazmorra) */
        #dungeon-canvas {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-image: 
                radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 40px 40px; /* Tamaño de la rejilla */
        }

        /* Estilo de las Habitaciones */
        .room {
            position: absolute;
            width: 45px;
            height: 45px;
            background: #2a2a2a;
            border: 2px solid var(--wall);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 10;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            animation: appear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Estilo de los Pasillos */
        .corridor {
            position: absolute;
            background: var(--corridor);
            z-index: 5;
            animation: grow 0.3s ease-out forwards;
        }

        @keyframes appear {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes grow {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Panel Lateral (Apuestas) */
        #side-panel {
            position: absolute;
            right: 20px;
            top: 80px;
            width: 250px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--gold);
            padding: 15px;
            max-height: 70%;
            overflow-y: auto;
            z-index: 100;
        }

        /* UI de Control */
        .controls { padding: 15px; background: #1a1a1a; display: flex; justify-content: center; gap: 20px; border-top: 1px solid var(--gold); }
        
        button {
            background: #222;
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 10px 25px;
            font-family: 'VT323';
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        .hidden { display: none; }

        /* Estilo para vista móvil (Jugador) */
        #view-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            height: 100%;
        }

        input {
            background: #000;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px;
            font-family: 'VT323';
            font-size: 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <h1>DUNGEON MASTER LOTTO</h1>
        <div id="seed-display" style="color: #888;">ESPERANDO EXPEDICIÓN...</div>
    </header>

    <div id="view-host" class="hidden">
        <div id="dungeon-canvas"></div>
        <div id="side-panel">
            <h3 style="color: var(--gold); margin-top: 0;">📜 APUESTAS</h3>
            <ul id="list-bets" style="list-style: none; padding: 0;"></ul>
        </div>
        <div class="controls">
            <button onclick="nuevaRonda()">NUEVA SEED</button>
            <button id="btn-reveal" style="display:none" onclick="revelar()">FORJAR MAZMORRA</button>
        </div>
    </div>

    <div id="view-player" class="hidden">
        <input type="text" id="p-name" placeholder="NOMBRE DEL HÉROE">
        <input type="number" id="p-bet" placeholder="¿CUÁNTAS SALAS?">
        <button onclick="enviarApuesta()">SELLAR APUESTA</button>
        <p id="msg-ok" style="color: var(--gold); font-size: 1.5rem;"></p>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const SB_URL = 'https://mzlamrxvtvxbuamyfplz.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16bGFtcnh2dHZ4YnVhbXlmcGx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTAxNjEsImV4cCI6MjA5MjkyNjE2MX0.fdebTvX68sDHUbIjCFDhfipauXap4qabWko7U8gLyxg';
    const miSupabase = supabase.createClient(SB_URL, SB_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const soyHost = urlParams.get('host') === 'true';

    // Iniciar vistas
    if (soyHost) {
        document.getElementById('view-host').classList.remove('hidden');
        escucharApuestas();
    } else {
        document.getElementById('view-player').classList.remove('hidden');
    }

    // --- LÓGICA DE GENERACIÓN PROCEDURAL ---
    const tileSize = 50; // Tamaño de cada celda en el grid
    let roomsData = [];

    async function nuevaRonda() {
        const letras = ['A', 'B', 'C'];
        let seed = "";
        for(let i=0; i<3; i++) seed += letras[Math.floor(Math.random() * 3)];
        
        document.getElementById('seed-display').innerText = "SEED ACTUAL: " + seed;
        document.getElementById('dungeon-canvas').innerHTML = "";
        document.getElementById('btn-reveal').style.display = 'block';
        
        // Reset DB
        await miSupabase.from('apuestas').delete().neq('id', 0);
        document.getElementById('list-bets').innerHTML = "";
    }

    async function enviarApuesta() {
        const n = document.getElementById('p-name').value;
        const b = document.getElementById('p-bet').value;
        if(!n || !b) return alert("Héroe, rellena los datos.");

        const { error } = await miSupabase.from('apuestas').insert([{ name: n, cantidad: parseInt(b) }]);
        if(!error) {
            document.getElementById('msg-ok').innerText = "✅ APUESTA REGISTRADA";
            document.getElementById('p-bet').value = "";
        }
    }

    function revelar() {
        const seed = document.getElementById('seed-display').innerText.split(": ")[1];
        let totalRooms = 0;
        seed.split('').forEach(l => {
            if(l === 'A') totalRooms += Math.floor(Math.random() * 4) + 1;
            if(l === 'B') totalRooms += Math.floor(Math.random() * 6) + 1;
            if(l === 'C') totalRooms += Math.floor(Math.random() * 8) + 1;
        });

        generarMapaProcedural(totalRooms);
        document.getElementById('btn-reveal').style.display = 'none';
    }

    function generarMapaProcedural(num) {
        const canvas = document.getElementById('dungeon-canvas');
        canvas.innerHTML = "";
        roomsData = [];
        
        // Centro del canvas
        const startX = Math.floor(canvas.offsetWidth / 2 / tileSize) * tileSize;
        const startY = Math.floor(canvas.offsetHeight / 2 / tileSize) * tileSize;

        // Primera habitación
        colocarHabitacion(startX, startY, "🏰", 0);

        // Generar resto de habitaciones
        for(let i = 1; i < num; i++) {
            setTimeout(() => {
                let success = false;
                let intentos = 0;

                while(!success && intentos < 50) {
                    // Elegir una habitación existente para ramificar
                    const parent = roomsData[Math.floor(Math.random() * roomsData.length)];
                    const dir = [[0,1], [0,-1], [1,0], [-1,0]][Math.floor(Math.random()*4)];
                    
                    const newX = parent.x + (dir[0] * tileSize);
                    const newY = parent.y + (dir[1] * tileSize);

                    // Verificar si está libre
                    if(!roomsData.some(r => r.x === newX && r.y === newY)) {
                        colocarPasillo(parent.x, parent.y, newX, newY);
                        colocarHabitacion(newX, newY, "🪨", i);
                        success = true;
                    }
                    intentos++;
                }
            }, i * 300);
        }
    }

    function colocarHabitacion(x, y, icon, index) {
        const canvas = document.getElementById('dungeon-canvas');
        const room = document.createElement('div');
        room.className = 'room';
        room.style.left = x + 'px';
        room.style.top = y + 'px';
        
        // Iconos especiales
        if(index > 0) {
            const rand = Math.random();
            if(rand > 0.85) icon = "💰";
            else if(rand > 0.7) icon = "💀";
        }
        
        room.innerHTML = icon;
        canvas.appendChild(room);
        roomsData.push({x, y});
    }

    function colocarPasillo(x1, y1, x2, y2) {
        const canvas = document.getElementById('dungeon-canvas');
        const corr = document.createElement('div');
        corr.className = 'corridor';
        
        const padding = 20;
        if(x1 === x2) { // Vertical
            corr.style.width = '4px';
            corr.style.height = tileSize + 'px';
            corr.style.left = (x1 + padding) + 'px';
            corr.style.top = Math.min(y1, y2) + padding + 'px';
        } else { // Horizontal
            corr.style.height = '4px';
            corr.style.width = tileSize + 'px';
            corr.style.top = (y1 + padding) + 'px';
            corr.style.left = Math.min(x1, x2) + padding + 'px';
        }
        canvas.appendChild(corr);
    }

    function escucharApuestas() {
        miSupabase.channel('apuestas-live')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'apuestas' }, payload => {
                const lista = document.getElementById('list-bets');
                const item = document.createElement('li');
                item.style.padding = "5px";
                item.style.borderBottom = "1px solid #333";
                item.innerHTML = `<span style="color:var(--gold)">${payload.new.name}</span>: ${payload.new.cantidad} salas`;
                lista.prepend(item);
            })
            .subscribe();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Seed Lotto 🏰</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=VT323&display=swap');

        :root {
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.4);
            --stone: #2c2c2c;
            --wall: #444;
            --bg: #0a0a0a;
            --accent: #e74c3c;
        }

        body {
            background-color: var(--bg);
            color: #eee;
            font-family: 'VT323', monospace;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Efecto de Escáner Retro */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background: #151515;
            border: 4px solid var(--wall);
            outline: 2px solid var(--gold);
            outline-offset: -10px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 3rem;
            margin: 0;
            text-shadow: 0 0 20px var(--gold-glow);
            letter-spacing: 5px;
        }

        .hidden { display: none; }

        /* Botones Juicy */
        button {
            background: var(--stone);
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 12px 24px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'VT323', monospace;
            margin: 10px;
            text-transform: uppercase;
        }

        button:hover {
            transform: scale(1.1);
            background: var(--gold);
            color: black;
            box-shadow: 0 0 15px var(--gold);
        }

        button:active { transform: scale(0.9); }

        input {
            background: #000;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px;
            font-size: 1.2rem;
            text-align: center;
            width: 200px;
            margin-bottom: 10px;
        }

        /* Mazmorra Visual mejorada */
        #dungeon-visual {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 15px;
            margin: 30px 0;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            min-height: 100px;
        }

        .room {
            width: 60px;
            height: 60px;
            background: var(--stone);
            border: 3px solid #555;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: roomAppear 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: inset 0 0 10px #000;
        }

        /* Conectores */
        .room::after {
            content: '';
            position: absolute;
            background: var(--wall);
            z-index: -1;
        }

        .room.connected-r::after { width: 15px; height: 6px; right: -15px; top: 27px; }

        @keyframes roomAppear {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            70% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* Leaderboard */
        #leaderboard {
            margin-top: 40px;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-left: 4px solid var(--gold);
        }

        #list-bets li {
            font-size: 1.4rem;
            padding: 5px 0;
            border-bottom: 1px dashed #444;
            display: flex;
            justify-content: space-between;
        }

        .bet-val { color: var(--gold); font-weight: bold; }

        /* Efectos Especiales */
        .shake { animation: shake 0.3s; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-3px, 0px); }
            40% { transform: translate(3px, 2px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>DUNGEON LOTTO</h1>
    <div style="color: var(--gold); margin-bottom: 20px;">— CRIPTAS DEL AZAR —</div>

    <div id="view-player" class="hidden">
        <input type="text" id="p-name" placeholder="NOMBRE DEL HÉROE"><br>
        <input type="number" id="p-bet" placeholder="APUESTA HABITACIONES"><br>
        <button onclick="enviarApuesta()">ENTRAR EN LA MAZMORRA</button>
        <p id="msg-ok"></p>
    </div>

    <div id="view-host" class="hidden">
        <div id="seed-box" style="font-size: 2rem; border: 1px solid var(--gold); display: inline-block; padding: 10px 30px;">
            SEED: <span id="display-seed" style="color: var(--gold);">???</span>
        </div>
        <br>
        <button onclick="nuevaRonda()">NUEVA EXPEDICIÓN</button>
        <button id="btn-reveal" onclick="revelar()" style="display:none">REVELAR MAPA</button>
        
        <div id="dungeon-visual"></div>

        <div id="leaderboard">
            <div style="color: var(--gold); margin-bottom: 10px;">EXPEDICIONARIOS ACTUALES:</div>
            <ul id="list-bets"></ul>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://mzlamrxvtvxbuamyfplz.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16bGFtcnh2dHZ4YnVhbXlmcGx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTAxNjEsImV4cCI6MjA5MjkyNjE2MX0.fdebTvX68sDHUbIjCFDhfipauXap4qabWko7U8gLyxg';
    const miSupabase = supabase.createClient(SB_URL, SB_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const soyHost = urlParams.get('host') === 'true';

    window.addEventListener('DOMContentLoaded', () => {
        if (soyHost) {
            document.getElementById('view-host').classList.remove('hidden');
            escucharApuestas();
        } else {
            document.getElementById('view-player').classList.remove('hidden');
        }
    });

    async function nuevaRonda() {
        const letras = ['A', 'B', 'C'];
        let nuevaSeed = "";
        for(let i=0; i<3; i++) nuevaSeed += letras[Math.floor(Math.random() * 3)];
        
        document.getElementById('display-seed').innerText = nuevaSeed;
        document.getElementById('dungeon-visual').innerHTML = "";
        document.getElementById('btn-reveal').style.display = 'inline-block';
        
        await miSupabase.from('apuestas').delete().neq('id', 0);
        document.getElementById('list-bets').innerHTML = "";
    }

    async function enviarApuesta() {
        const valNombre = document.getElementById('p-name').value;
        const valApuesta = document.getElementById('p-bet').value;
        if(!valNombre || !valApuesta) return alert("Héroe, pon tu nombre y apuesta.");

        const { error } = await miSupabase
            .from('apuestas')
            .insert([{ name: valNombre, cantidad: parseInt(valApuesta) }]);

        if (!error) {
            document.getElementById('msg-ok').innerHTML = "✅ APUESTA SELLADA CON SANGRE";
            document.getElementById('p-bet').value = "";
        }
    }

    function revelar() {
        const seed = document.getElementById('display-seed').innerText;
        let total = 0;
        seed.split('').forEach(letra => {
            if(letra === 'A') total += Math.floor(Math.random() * 4) + 1;
            if(letra === 'B') total += Math.floor(Math.random() * 6) + 1;
            if(letra === 'C') total += Math.floor(Math.random() * 8) + 1;
        });
        animarMazmorra(total);
    }

    function animarMazmorra(num) {
        const contenedor = document.getElementById('dungeon-visual');
        contenedor.innerHTML = "";
        
        for(let i=0; i<num; i++) {
            setTimeout(() => {
                const sala = document.createElement('div');
                sala.className = 'room connected-r';
                
                // Icono aleatorio de sala (tesoro, enemigo, vacío)
                const randomIcon = Math.random();
                if(randomIcon > 0.8) sala.innerHTML = "💰";
                else if(randomIcon > 0.6) sala.innerHTML = "💀";
                else sala.innerHTML = "🪨";

                contenedor.appendChild(sala);
                
                // Efecto de vibración en el contenedor cada vez que aparece una sala
                document.getElementById('game-container').classList.add('shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 200);
                
            }, i * 300);
        }
    }

    function escucharApuestas() {
        miSupabase.channel('cambios-apuestas')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'apuestas' }, payload => {
                const lista = document.getElementById('list-bets');
                const item = document.createElement('li');
                item.style.animation = "roomAppear 0.4s ease forwards";
                item.innerHTML = `<span>👤 ${payload.new.name}</span> <span class="bet-val">${payload.new.cantidad} HAB</span>`;
                lista.appendChild(item);
            })
            .subscribe();
    }
</script>
</body>
</html>
